<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Isle of Palms Beach Renourishment Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --navy: #073b4c;
      --blue: #118ab2;
      --aqua: #06d6a0;
      --gold: #ffd166;
      --coral: #ef476f;
      --paper: rgba(255,255,255,.94);
      --shadow: 0 12px 30px rgba(7,59,76,.22);
    }
    html, body { height: 100%; margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; color: #123; }
    #map { height: 100%; width: 100%; background: #d9f4ff; }
    .topbar {
      position: absolute;
      z-index: 900;
      top: 14px;
      left: 14px;
      pointer-events: none;
    }
    .hero, .status-panel {
      background: var(--paper); border-radius: 18px; box-shadow: var(--shadow);
      backdrop-filter: blur(8px); pointer-events: auto;
    }
    .hero { padding: 14px 16px; max-width: 430px; }
    .eyebrow { color: var(--blue); font-weight: 800; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; }
    h1 { margin: 2px 0 4px; font-size: 22px; line-height: 1.08; color: var(--navy); }
    .hero p { margin: 4px 0 0; font-size: 13px; line-height: 1.35; color: #345; }
    .status-panel {
      padding: 12px;
      width: min(410px, 40vw);
      pointer-events: auto;
    }
    .panel-title { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom: 8px; }
    .panel-title strong { color: var(--navy); font-size: 15px; }
    .last-updated { color: #567; font-size: 12px; }
    .reach-card { border: 1px solid rgba(7,59,76,.12); border-radius: 14px; padding: 10px; margin-top: 8px; background: white; cursor: pointer; transition: transform .15s ease, border-color .15s ease; }
    .reach-card:hover { transform: translateY(-1px); border-color: var(--blue); }
    .reach-head { display:flex; justify-content:space-between; gap:8px; align-items:center; }
    .reach-name { font-weight: 800; color: var(--navy); }
    .pill { font-size: 11px; font-weight: 800; border-radius: 999px; padding: 4px 8px; white-space: nowrap; }
    .pending { background: #edf2f7; color: #506070; }
    .active { background: #fff4cf; color: #7a5200; }
    .complete { background: #d9fbe9; color: #05633f; }
    .bar { position: relative; height: 10px; border-radius: 999px; overflow:hidden; background: #e7eef4; margin: 8px 0 6px; }
    .bar > span {
      position:absolute;
      inset:0 auto 0 0;
      width: 0%;
      border-radius: 999px;
      background: var(--navy);
    }
    .reach-meta { display:flex; justify-content:space-between; gap:10px; color:#567; font-size:12px; }
    .hotel-label {
      background: rgba(255,255,255,0.96); border: 1px solid rgba(7,59,76,.25); border-radius: 999px;
      padding: 3px 7px; font-size: 11px; font-weight: 800; color: var(--navy); white-space: nowrap; box-shadow: 0 2px 10px rgba(0,0,0,.22);
    }
    .date-label {
      background: rgba(255,255,255,0.98);
      border: 2px solid currentColor;
      border-radius: 14px;
      padding: 6px 9px;
      font-size: 12px;
      font-weight: 900;
      line-height: 1.15;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(0,0,0,.24);
      position: relative;
    }
    .date-label small {
      display: block;
      font-size: 10px;
      font-weight: 800;
      opacity: .75;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .date-label:after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      background: white;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(45deg);
      left: 50%;
      margin-left: -6px;
      bottom: -8px;
    }
    .tractor-icon { font-size: 30px; filter: drop-shadow(0 4px 4px rgba(0,0,0,.35)); transform-origin: center; }
    .pulse { width: 18px; height: 18px; border-radius: 999px; background: var(--gold); border: 3px solid white; box-shadow: 0 0 0 0 rgba(255,209,102,.75); animation: pulse 1.8s infinite; }
    @keyframes pulse { 70% { box-shadow: 0 0 0 14px rgba(255,209,102,0); } 100% { box-shadow: 0 0 0 0 rgba(255,209,102,0); } }
    .leaflet-popup-content { font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    .popup-title { font-weight: 900; color: var(--navy); font-size: 15px; margin-bottom: 4px; }
    .popup-note { color:#456; line-height: 1.35; }
    .legend {
      background: var(--paper);
      padding: 12px 14px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      font-size: 13px;
      line-height: 1.5;
      min-width: 190px;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
      white-space: nowrap;
    }
    .legend-icon {
      width: 18px;
      text-align: center;
      flex-shrink: 0;
    }
    .legend strong { color: var(--navy); }
    .swatch { display:inline-block; width: 13px; height: 13px; border-radius: 4px; margin-right: 6px; vertical-align: -2px; }
    @media (max-width: 840px) {
      .topbar { flex-direction: column; right: 10px; left: 10px; top: 10px; }
      .hero { max-width: none; }
      .status-panel { width: auto; margin-left: 0; max-height: 38vh; overflow:auto; }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="topbar">
    
    <aside class="status-panel" id="statusPanel"></aside>
  </div>
<script>
    const map = L.map('map', { zoomControl: false }).setView([32.7965, -79.767], 14.9);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Edit only this object for live updates.
    const projectStatus = {
      lastUpdated: 'Project not yet started',
      activeReachId: 1,
      workLocationPercent: 0,
      reaches: {
        1: { progress: 0, status: 'Pending', note: 'Work has not started in this reach.' },
        2: { progress: 0, status: 'Pending', note: 'Work has not started in this reach.' },
        3: { progress: 0, status: 'Pending', note: 'Work has not started in this reach.' }
      }
    };

    const reaches = [
      {
        id: 3, name: 'Reach 3', label: 'IOP Beach Restoration Project Reach 3', color: '#073b4c',
        startDate: 'Sept. 1', endDate: 'Nov. 1',
        landwardEdge: [[32.77598,-79.81121],[32.77431,-79.81038],[32.77449,-79.80734],[32.77539,-79.80479],[32.78548,-79.78548]],
        seawardEdge: [[32.77610,-79.81210],[32.77360,-79.81120],[32.77360,-79.80810],[32.78037,-79.79304],[32.78478,-79.78585]]
      },
      {
        id: 2, name: 'Reach 2', label: 'IOP Beach Restoration Project Reach 2', color: '#118ab2',
        startDate: 'Aug. 1', endDate: 'Sept. 1',
        landwardEdge: [[32.80108,-79.73891],[32.80294,-79.73196],[32.80513,-79.72736]],
        seawardEdge: [[32.80039,-79.73718],[32.80185,-79.73165],[32.80439,-79.72720]]
      },
      {
        id: 1, name: 'Reach 1', label: 'IOP Beach Restoration Project Reach 1', color: '#06d6a0',
        startDate: 'July 1', endDate: 'Aug. 1',
        landwardEdge: [[32.80676,-79.72461],[32.81226,-79.71901],[32.81611,-79.71791]],
        seawardEdge: [[32.80690,-79.72265],[32.81022,-79.71877],[32.81501,-79.71781]]
      }
    ];

    const hotels = [
      { name: 'Ocean Club', coords: [32.81333, -79.72016], reach: 'Reach 3' },
      { name: 'Seascape', coords: [32.81197, -79.72108], reach: 'Reach 3' },
      { name: 'Summer House', coords: [32.81005, -79.72312], reach: 'Reach 3' },
      { name: "Port O'Call", coords: [32.81138, -79.72227], reach: 'Reach 3' },
      { name: "Mariner's Walk", coords: [32.80757, -79.72572], reach: 'Reach 3' },
      { name: 'Shipwatch Villas', coords: [32.80903, -79.72502], reach: 'Reach 3' },
      { name: 'Boardwalk Inn', coords: [32.80234, -79.73767], reach: 'Reach 2' },
      { name: 'Beach Club', coords: [32.80512, -79.72918], reach: 'Reach 2' },
      { name: 'Sea Cabins', coords: [32.78561, -79.78678], reach: 'Reach 1' },
      { name: 'Palm Hotel', coords: [32.78492, -79.78866], reach: 'Reach 1' },
      { name: 'Seaside Inn', coords: [32.78455, -79.78973], reach: 'Reach 1' }
    ];

    const layersByReach = new Map();
    const dateLabelLayers = []; // retained for future use if needed
    const allBounds = L.latLngBounds([]);
    let tractorMarker, pulseMarker;

    function polygonFor(reach) { return [...reach.landwardEdge, ...[...reach.seawardEdge].reverse()]; }
    function centerLineFor(reach) {
      const count = Math.min(reach.landwardEdge.length, reach.seawardEdge.length);
      const line = [];
      for (let i = 0; i < count; i++) {
        line.push([(reach.landwardEdge[i][0] + reach.seawardEdge[i][0]) / 2, (reach.landwardEdge[i][1] + reach.seawardEdge[i][1]) / 2]);
      }
      return line;
    }
    function interpolate(line, pct) {
      const p = Math.max(0, Math.min(100, pct)) / 100;
      if (line.length === 1) return line[0];
      const seg = p * (line.length - 1);
      const i = Math.min(Math.floor(seg), line.length - 2);
      const t = seg - i;
      return [line[i][0] + (line[i+1][0] - line[i][0]) * t, line[i][1] + (line[i+1][1] - line[i][1]) * t];
    }
    function completedPolygon(reach, pct, reverse = false) {
      if (pct <= 0) return [];

      const landward = reverse ? [...reach.landwardEdge].reverse() : [...reach.landwardEdge];
      const seaward = reverse ? [...reach.seawardEdge].reverse() : [...reach.seawardEdge];

      const p = Math.max(0, Math.min(100, pct)) / 100;
      const maxIndex = landward.length - 1;
      const seg = p * maxIndex;
      const i = Math.min(Math.floor(seg), maxIndex - 1);
      const t = seg - i;

      const interpLand = [
        landward[i][0] + (landward[i + 1][0] - landward[i][0]) * t,
        landward[i][1] + (landward[i + 1][1] - landward[i][1]) * t
      ];

      const interpSea = [
        seaward[i][0] + (seaward[i + 1][0] - seaward[i][0]) * t,
        seaward[i][1] + (seaward[i + 1][1] - seaward[i][1]) * t
      ];

      const landSlice = landward.slice(0, i + 1);
      landSlice.push(interpLand);

      const seaSlice = seaward.slice(0, i + 1);
      seaSlice.push(interpSea);

      return [...landSlice, ...seaSlice.reverse()];
    }
    function statusClass(status) { return status.toLowerCase().includes('complete') ? 'complete' : status.toLowerCase().includes('active') ? 'active' : 'pending'; }

    function drawMap() {
      
      layersByReach.forEach(group => map.removeLayer(group));
      layersByReach.clear();
      if (tractorMarker) map.removeLayer(tractorMarker);
      if (pulseMarker) map.removeLayer(pulseMarker);

      reaches.forEach(reach => {
        const status = projectStatus.reaches[reach.id];
        const polygonCoords = polygonFor(reach);
        polygonCoords.forEach(pt => allBounds.extend(pt));
        const centerLine = centerLineFor(reach);
        const group = L.layerGroup();
        const fillOpacity = status.progress === 100 ? .58 : status.status === 'Active' ? .32 : .14;
        const reverseFill = reach.id === 1 ? false : true;

        L.polygon(polygonCoords, {
          color: reach.color,
          fillColor: reach.color,
          fillOpacity: .16,
          weight: 4,
          opacity: 1,
          smoothFactor: 2
        }).addTo(group)

          .bindPopup(`<div class="popup-title">${reach.label}</div><div class="popup-note"><b>Status:</b> ${status.status}<br><b>Progress:</b> ${status.progress}%<br>${status.note}</div>`);
        const completedArea = completedPolygon(reach, status.progress, reverseFill);

        if (completedArea.length > 2) {
          L.polygon(completedArea, {
            color: reach.color,
            fillColor: reach.color,
            fillOpacity: 1,
            weight: 2,
            opacity: 1,
            smoothFactor: 2
          }).addTo(group);
        }
        

        group.addTo(map);
        layersByReach.set(reach.id, group);
      });

      const active = reaches.find(r => r.id === projectStatus.activeReachId);
      const activeLine = centerLineFor(active);
      const activeReverse = active.id === 1 ? false : true;
      const activeDisplayLine = activeReverse ? [...activeLine].reverse() : activeLine;
      const activePoint = interpolate(activeDisplayLine, projectStatus.workLocationPercent);
      const tractorIcon = L.divIcon({ className: '', html: '<div class="tractor-icon">🚜</div>', iconSize: [34, 34], iconAnchor: [17, 17] });
      const pulseIcon = L.divIcon({ className: '', html: '<div class="pulse"></div>', iconSize: [24, 24], iconAnchor: [12, 12] });
      pulseMarker = L.marker(activePoint, { icon: pulseIcon, interactive: false }).addTo(map);
      tractorMarker = L.marker(activePoint, { icon: tractorIcon }).addTo(map)
        .bindPopup(`<div class="popup-title">Current work location</div><div class="popup-note">${active.name}: approximately ${projectStatus.workLocationPercent}% through this reach.</div>`);
    }

    function drawHotels() {
      const hotelIcon = L.divIcon({ className: '', html: '<div style="width:13px;height:13px;background:#ef476f;border:2px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.35)"></div>', iconSize: [17,17], iconAnchor: [8,8] });
      hotels.forEach(hotel => {
        const match = hotel.reach.match(/\d+/);
        const status = match ? projectStatus.reaches[Number(match[0])] : null;
        L.marker(hotel.coords, { icon: hotelIcon }).addTo(map)
          .bindTooltip(hotel.name, { permanent: true, direction: 'top', offset: [0,-8], className: 'hotel-label' })
          .bindPopup(`<div class="popup-title">${hotel.name}</div><div class="popup-note">Nearby project area: <b>${hotel.reach}</b><br>Current public status: <b>${status ? status.status : 'Check updates'}</b></div>`);
      });
    }

    function drawPanel() {
      const el = document.getElementById('statusPanel');
      el.innerHTML = `<div class="panel-title"><strong>Live Reach Status</strong><span class="last-updated">${projectStatus.lastUpdated}</span></div>` +
        reaches.slice().sort((a,b) => a.id - b.id).map(reach => {
          const s = projectStatus.reaches[reach.id];
          const nearbyHotels = hotels.filter(h => h.reach === reach.name).map(h => h.name).join(', ') || 'No hotel labels assigned';
          return `<div class="reach-card" onclick="focusReach(${reach.id})">
            <div class="reach-head"><span class="reach-name" style="border-left:6px solid ${reach.color};padding-left:8px">${reach.name}</span><span class="pill ${statusClass(s.status)}">${s.status}</span></div>
            <div class="bar"><span style="width:${s.progress}%; background:${reach.color}"></span></div>
            <div class="reach-meta"><span>${s.progress}% complete</span><span>${reach.startDate} - ${reach.endDate}</span></div>
            
          </div>`;
        }).join('');
    }

    function focusReach(id) {
      const reach = reaches.find(r => r.id === id);
      map.fitBounds(L.latLngBounds(polygonFor(reach)).pad(.28));
    }
const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function () {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = `
        <strong>Map Key</strong>

        <div class="legend-row">
          <span class="swatch" style="background:rgba(6,214,160,.16); border:3px solid #06d6a0"></span>
          <span>Reach 1</span>
        </div>

        <div class="legend-row">
          <span class="swatch" style="background:rgba(17,138,178,.16); border:3px solid #118ab2"></span>
          <span>Reach 2</span>
        </div>

        <div class="legend-row">
          <span class="swatch" style="background:rgba(7,59,76,.16); border:3px solid #073b4c"></span>
          <span>Reach 3</span>
        </div>

        <div class="legend-row">
          <span class="swatch" style="background:rgba(7,59,76,.55)"></span>
          <span>Completed Work Area</span>
        </div>

        <div class="legend-row">
          <span class="legend-icon">🚜</span>
          <span>Current Work Location</span>
        </div>

        <div class="legend-row">
          <span class="legend-icon" style="color:#ef476f;font-weight:900">●</span>
          <span>Hotel / Resort</span>
        </div>
      `;
      return div;
    };

    drawMap(); drawHotels(); drawPanel(); legend.addTo(map);

    const adjustedBounds = allBounds.pad(.08);
    map.fitBounds(adjustedBounds, {
      maxZoom: 15,
      paddingTopLeft: [430, 20],
      paddingBottomRight: [20, 20]
    });
  </script>
</body>
</html>
